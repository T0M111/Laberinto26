name: CI - Verificación de Código

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Ejecutar Código Python
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Configurar Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Mostrar versión de Python
      run: python --version
    
    - name: Verificar sintaxis de archivos Python
      run: |
        python -m py_compile *.py
    
    - name: Ejecutar programa principal
      run: |
        if [ -f main.py ]; then
          python main.py
        fi
    
    - name: Verificar que no hay errores de importación
      run: |
        python -c "
        import sys
        try:
            import elemento_mapa
            import pared
            import puerta
            import habitacion
            import laberinto
            import juego
            import decorator
            import bomba
            import hechizo
            import laberinto_factory
            import pared_bomba
            import pared_fuego
            import puerta_bomba
            import puerta_fuego
            import laberinto_bombas_factory
            import laberinto_fuego_factory
            import orientacion
            import builder
            import laberinto_builder
            import director
            import varita
            import bicho_adapter
            import personaje
            print('✓ Todas las importaciones exitosas')
        except ImportError as e:
            print(f'✗ Error de importación: {e}')
            sys.exit(1)
        "

    - name: Verificar Singleton Norte
      run: |
        python -c "
        import sys
        from orientacion import Norte
        n1 = Norte()
        n2 = Norte()
        if n1 is not n2:
            print('✗ Singleton roto: Norte() devuelve instancias distintas')
            sys.exit(1)
        if Norte.unicaInstancia is not n1:
            print('✗ Singleton roto: unicaInstancia no coincide')
            sys.exit(1)
        print('✓ Singleton Norte verificado correctamente')
        "

    - name: Verificar Adapter BichoAdapter
      run: |
        python -c "
        import sys
        from bicho import Bicho
        from modo import Agresivo, Perezoso
        from bicho_adapter import BichoAdapter
        from personaje import Personaje
        from varita import Varita

        # BichoAdapter debe ser subclase de Varita
        if not issubclass(BichoAdapter, Varita):
            print('✗ BichoAdapter no extiende Varita')
            sys.exit(1)

        bicho = Bicho('Test', Agresivo())
        adapter = BichoAdapter(bicho)
        mago = Personaje('Mago', adapter)

        # Agresivo -> Perezoso
        mago.pedir_cambio_modo()
        if not isinstance(bicho.modo, Perezoso):
            print('✗ Adapter: modo debería ser Perezoso tras primer cambio')
            sys.exit(1)

        # Perezoso -> Agresivo
        mago.pedir_cambio_modo()
        if not isinstance(bicho.modo, Agresivo):
            print('✗ Adapter: modo debería ser Agresivo tras segundo cambio')
            sys.exit(1)

        print('✓ Adapter BichoAdapter verificado correctamente')
        "
